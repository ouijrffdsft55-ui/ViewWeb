<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Webhook Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d0d1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
            min-height: 100vh;
            color: #f0f0f5;
        }
        .app {
            max-width: 900px;
            width: 100%;
        }
        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .badge {
            background: #1e1e2f;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            color: #a8a8c8;
            border: 1px solid #2d2d4a;
        }
        .badge span {
            color: #8b5cf6;
            font-weight: 600;
        }

        /* card */
        .card {
            background: #151525;
            border: 1px solid #252540;
            border-radius: 20px;
            padding: 25px 28px;
            margin-bottom: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #c8c8e8;
        }
        .card-title .icon {
            font-size: 20px;
        }

        /* form */
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #a8a8c8;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: #0d0d1a;
            border: 1px solid #2d2d4a;
            border-radius: 12px;
            color: #f0f0f5;
            font-size: 14px;
            outline: none;
            transition: border .25s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #6d28d9;
        }
        .form-group textarea {
            min-height: 90px;
            resize: vertical;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        @media (max-width: 550px) {
            .row { grid-template-columns: 1fr; }
        }

        /* advanced toggles */
        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 6px 0 16px 0;
            flex-wrap: wrap;
        }
        .toggle-wrap label {
            font-size: 13px;
            color: #a8a8c8;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .toggle-wrap input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #6d28d9;
            cursor: pointer;
        }

        /* buttons */
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: .2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2d2d4a;
            color: #c8c8e8;
        }
        .btn-primary {
            background: #6d28d9;
            color: #fff;
        }
        .btn-primary:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(109, 40, 217, 0.35);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-danger {
            background: #b91c1c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
            border-radius: 8px;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        /* status & log */
        #status {
            padding: 12px 18px;
            border-radius: 12px;
            margin-top: 16px;
            font-weight: 500;
            display: none;
            font-size: 14px;
        }
        #status.success {
            display: block;
            background: #0f2a1f;
            color: #6ee7a7;
            border: 1px solid #1f5a3a;
        }
        #status.error {
            display: block;
            background: #2a0f0f;
            color: #f58b8b;
            border: 1px solid #5a1f1f;
        }
        #status.info {
            display: block;
            background: #0f1a2a;
            color: #7bb3f5;
            border: 1px solid #1f3a5a;
        }

        .log-box {
            background: #0a0a14;
            border-radius: 12px;
            padding: 14px 18px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #8a8aaa;
            border: 1px solid #1a1a30;
            margin-top: 10px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-box .log-success { color: #6ee7a7; }
        .log-box .log-error { color: #f58b8b; }
        .log-box .log-info { color: #7bb3f5; }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #4a4a6a;
            margin-top: 30px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app">
        <!-- header -->
        <div class="header">
            <h1>📨 Webhook Pro</h1>
            <div class="badge">📤 Đã gửi: <span id="totalSent">0</span></div>
        </div>

        <!-- main form -->
        <div class="card">
            <div class="card-title"><span class="icon">⚙️</span> Cấu hình gửi</div>

            <div class="form-group">
                <label>🔗 URL Webhook (nhập 1 hoặc nhiều, mỗi URL 1 dòng)</label>
                <textarea id="webhookUrls" rows="2" placeholder="https://discord.com/api/webhooks/...&#10;https://discord.com/api/webhooks/..."></textarea>
            </div>

            <div class="form-group">
                <label>💬 Nội dung tin nhắn</label>
                <textarea id="messageContent" placeholder="Nhập tin nhắn... hỗ trợ @mention, emoji, markdown"></textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>👤 Tên hiển thị (tùy chọn)</label>
                    <input type="text" id="webhookName" placeholder="Để trống dùng tên mặc định" />
                </div>
                <div class="form-group">
                    <label>🖼️ Avatar URL (tùy chọn)</label>
                    <input type="url" id="webhookAvatar" placeholder="https://example.com/avatar.png" />
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>⏱️ Số lần gửi</label>
                    <input type="number" id="sendCount" value="1" min="1" max="50" />
                </div>
                <div class="form-group">
                    <label>⏳ Delay (giây) giữa các lần</label>
                    <input type="number" id="sendDelay" value="1" min="0.5" step="0.5" />
                </div>
            </div>

            <!-- advanced -->
            <div class="toggle-wrap">
                <label><input type="checkbox" id="toggleEmbed" /> 📦 Gửi dạng Embed</label>
                <label><input type="checkbox" id="toggleFile" /> 📎 Đính kèm file (URL)</label>
            </div>

            <div id="embedOptions" class="hidden">
                <div class="row">
                    <div class="form-group">
                        <label>Tiêu đề Embed</label>
                        <input type="text" id="embedTitle" placeholder="Tiêu đề" />
                    </div>
                    <div class="form-group">
                        <label>Màu sắc (hex)</label>
                        <input type="text" id="embedColor" placeholder="#6d28d9" value="#6d28d9" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Mô tả Embed</label>
                    <textarea id="embedDesc" rows="2" placeholder="Mô tả embed..."></textarea>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Footer</label>
                        <input type="text" id="embedFooter" placeholder="Footer text" />
                    </div>
                    <div class="form-group">
                        <label>URL ảnh (image)</label>
                        <input type="url" id="embedImage" placeholder="https://example.com/image.png" />
                    </div>
                </div>
            </div>

            <div id="fileOptions" class="hidden">
                <div class="form-group">
                    <label>URL file đính kèm</label>
                    <input type="url" id="fileUrl" placeholder="https://example.com/file.png" />
                </div>
                <div class="form-group">
                    <label>Tên file hiển thị</label>
                    <input type="text" id="fileName" placeholder="ten_file.png" />
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="sendBtn">🚀 Gửi tin nhắn</button>
                <button class="btn" id="clearLogsBtn">🧹 Xóa log</button>
                <button class="btn btn-danger btn-sm" id="saveUrlsBtn">💾 Lưu webhook</button>
            </div>

            <div id="status"></div>
        </div>

        <!-- log -->
        <div class="card">
            <div class="card-title"><span class="icon">📋</span> Nhật ký gửi</div>
            <div class="log-box" id="logBox">▶️ Sẵn sàng... Gửi tin nhắn để xem log.</div>
        </div>

        <div class="footer">
            ⚠️ Chỉ dùng cho webhook của bạn. Không spam vào server người khác.
        </div>
    </div>

    <script>
        (function() {
            // DOM refs
            const webhookUrls = document.getElementById('webhookUrls');
            const messageContent = document.getElementById('messageContent');
            const webhookName = document.getElementById('webhookName');
            const webhookAvatar = document.getElementById('webhookAvatar');
            const sendCount = document.getElementById('sendCount');
            const sendDelay = document.getElementById('sendDelay');
            const sendBtn = document.getElementById('sendBtn');
            const statusDiv = document.getElementById('status');
            const logBox = document.getElementById('logBox');
            const totalSentSpan = document.getElementById('totalSent');
            const clearLogsBtn = document.getElementById('clearLogsBtn');
            const saveUrlsBtn = document.getElementById('saveUrlsBtn');

            // toggles
            const toggleEmbed = document.getElementById('toggleEmbed');
            const toggleFile = document.getElementById('toggleFile');
            const embedOptions = document.getElementById('embedOptions');
            const fileOptions = document.getElementById('fileOptions');
            const embedTitle = document.getElementById('embedTitle');
            const embedColor = document.getElementById('embedColor');
            const embedDesc = document.getElementById('embedDesc');
            const embedFooter = document.getElementById('embedFooter');
            const embedImage = document.getElementById('embedImage');
            const fileUrl = document.getElementById('fileUrl');
            const fileName = document.getElementById('fileName');

            let totalSent = 0;
            let isSending = false;

            // load saved webhooks from localStorage
            function loadSavedUrls() {
                try {
                    const saved = localStorage.getItem('webhookPro_urls');
                    if (saved) {
                        webhookUrls.value = saved;
                    }
                } catch (e) {}
            }
            loadSavedUrls();

            // save
            saveUrlsBtn.addEventListener('click', function() {
                const urls = webhookUrls.value.trim();
                if (!urls) {
                    showStatus('⚠️ Vui lòng nhập ít nhất 1 URL webhook để lưu.', 'error');
                    return;
                }
                try {
                    localStorage.setItem('webhookPro_urls', urls);
                    showStatus('✅ Đã lưu danh sách webhook vào bộ nhớ.', 'success');
                } catch (e) {
                    showStatus('❌ Lỗi lưu: ' + e.message, 'error');
                }
            });

            // clear logs
            clearLogsBtn.addEventListener('click', function() {
                logBox.innerHTML = '🧹 Đã xóa log.';
                statusDiv.className = '';
                statusDiv.style.display = 'none';
            });

            // toggle embed
            toggleEmbed.addEventListener('change', function() {
                embedOptions.classList.toggle('hidden', !this.checked);
            });
            toggleFile.addEventListener('change', function() {
                fileOptions.classList.toggle('hidden', !this.checked);
            });

            // show status
            function showStatus(msg, type) {
                statusDiv.textContent = msg;
                statusDiv.className = type;
                statusDiv.style.display = 'block';
            }

            function addLog(msg, type) {
                const colors = {
                    success: 'log-success',
                    error: 'log-error',
                    info: 'log-info'
                };
                const cls = colors[type] || 'log-info';
                const time = new Date().toLocaleTimeString();
                logBox.innerHTML += `<div class="${cls}">[${time}] ${msg}</div>`;
                logBox.scrollTop = logBox.scrollHeight;
            }

            // main send
            sendBtn.addEventListener('click', async function() {
                if (isSending) {
                    showStatus('⏳ Đang gửi, vui lòng đợi...', 'info');
                    return;
                }

                const urlsRaw = webhookUrls.value.trim();
                if (!urlsRaw) {
                    showStatus('⚠️ Vui lòng nhập ít nhất 1 URL webhook.', 'error');
                    return;
                }
                const urls = urlsRaw.split('\n').map(u => u.trim()).filter(u => u !== '');
                if (urls.length === 0) {
                    showStatus('⚠️ Không có URL hợp lệ.', 'error');
                    return;
                }

                const content = messageContent.value.trim();
                if (!content && !toggleEmbed.checked) {
                    showStatus('⚠️ Vui lòng nhập nội dung tin nhắn hoặc bật Embed.', 'error');
                    return;
                }

                const count = parseInt(sendCount.value) || 1;
                const delay = parseFloat(sendDelay.value) || 1;
                if (count < 1 || count > 100) {
                    showStatus('⚠️ Số lần gửi phải từ 1-100.', 'error');
                    return;
                }

                // build payload
                let payload = {};
                if (toggleEmbed.checked) {
                    const embed = {
                        title: embedTitle.value || undefined,
                        description: embedDesc.value || undefined,
                        color: parseInt(embedColor.value.replace('#', ''), 16) || undefined,
                        footer: embedFooter.value ? { text: embedFooter.value } : undefined,
                        image: embedImage.value ? { url: embedImage.value } : undefined,
                    };
                    // clean undefined
                    for (let k in embed) if (embed[k] === undefined) delete embed[k];
                    if (Object.keys(embed).length > 0) {
                        payload.embeds = [embed];
                    } else {
                        showStatus('⚠️ Embed trống, hãy nhập ít nhất 1 trường.', 'error');
                        return;
                    }
                } else {
                    payload.content = content;
                }

                // name & avatar
                if (webhookName.value.trim()) payload.username = webhookName.value.trim();
                if (webhookAvatar.value.trim()) payload.avatar_url = webhookAvatar.value.trim();

                // file attachment (chỉ hỗ trợ 1 file qua URL, cần dùng multipart nhưng để đơn giản gửi embed image thay thế)
                // Discord webhook file đính kèm yêu cầu multipart/form-data, phức tạp. Tạm thời bỏ qua.

                isSending = true;
                sendBtn.disabled = true;
                sendBtn.textContent = '⏳ Đang gửi...';
                showStatus(`⏳ Đang gửi ${count} lần đến ${urls.length} webhook...`, 'info');

                let successCount = 0;
                let errorCount = 0;
                let logMessages = [];

                for (let i = 0; i < count; i++) {
                    for (const url of urls) {
                        try {
                            const response = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            if (response.ok) {
                                successCount++;
                                totalSent++;
                                logMessages.push(`✅ Thành công → ${url.substring(0, 50)}...`);
                            } else {
                                let errMsg = `HTTP ${response.status}`;
                                try {
                                    const errJson = await response.json();
                                    if (errJson.message) errMsg += ` - ${errJson.message}`;
                                } catch (e) {}
                                errorCount++;
                                logMessages.push(`❌ Lỗi → ${url.substring(0, 50)}... | ${errMsg}`);
                            }
                        } catch (err) {
                            errorCount++;
                            logMessages.push(`❌ Lỗi kết nối → ${url.substring(0, 50)}... | ${err.message}`);
                        }
                    }
                    // update status mỗi lần
                    const progress = `⏳ Lần ${i+1}/${count} | ✅ ${successCount} | ❌ ${errorCount}`;
                    showStatus(progress, 'info');

                    // delay except last
                    if (i < count - 1 && delay > 0) {
                        await new Promise(resolve => setTimeout(resolve, delay * 1000));
                    }
                }

                // final status
                const finalMsg = `✅ Thành công: ${successCount} | ❌ Thất bại: ${errorCount}`;
                if (errorCount === 0) {
                    showStatus(`🎉 Gửi thành công! ${finalMsg}`, 'success');
                } else if (successCount === 0) {
                    showStatus(`❌ Gửi thất bại hoàn toàn. ${finalMsg}`, 'error');
                } else {
                    showStatus(`⚠️ Gửi có lỗi. ${finalMsg}`, 'error');
                }

                // log
                logMessages.forEach(msg => {
                    const type = msg.includes('✅') ? 'success' : 'error';
                    addLog(msg, type);
                });
                addLog(`📊 Tổng kết: ${finalMsg}`, 'info');
                totalSentSpan.textContent = totalSent;

                isSending = false;
                sendBtn.disabled = false;
                sendBtn.textContent = '🚀 Gửi tin nhắn';
            });

        })();
    </script>
</body>
</html>
