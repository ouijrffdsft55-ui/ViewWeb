<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool tạo Gmail - Đăng nhập thủ công</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: #161b22;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #30363d;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        h1 {
            font-size: 24px;
            color: #f0f6fc;
            border-bottom: 2px solid #238636;
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 14px;
            font-weight: normal;
            color: #8b949e;
            margin-left: auto;
        }
        .info-box {
            background: #0d1117;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 20px;
            border-left: 4px solid #f0883e;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .info-box .pwd {
            color: #f0883e;
            font-weight: bold;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            background: #0d1117;
            padding: 4px 14px;
            border: 1px dashed #f0883e;
            border-radius: 6px;
        }
        .info-box .badge {
            background: #238636;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #fff;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .controls button {
            flex: 1;
            min-width: 130px;
            padding: 14px 18px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }
        .controls button:hover { opacity: 0.85; transform: scale(1.01); }
        .controls .btn-create { background: #238636; color: #fff; border-color: #238636; }
        .controls .btn-clear { background: #da3633; color: #fff; border-color: #da3633; }
        .controls .btn-export { background: #9e6a03; color: #fff; border-color: #9e6a03; }
        .controls .btn-copy { background: #1f6feb; color: #fff; border-color: #1f6feb; }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 14px;
            flex-wrap: wrap;
        }
        .stats span {
            background: #0d1117;
            padding: 5px 16px;
            border-radius: 30px;
            border: 1px solid #30363d;
        }

        .table-wrap {
            overflow-x: auto;
            margin-bottom: 16px;
            border-radius: 10px;
            border: 1px solid #30363d;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: #0d1117;
            padding: 12px 10px;
            text-align: left;
            color: #8b949e;
            font-weight: 600;
            border-bottom: 2px solid #30363d;
            position: sticky;
            top: 0;
        }
        td {
            padding: 10px 10px;
            border-bottom: 1px solid #21262d;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        td .copy-btn {
            background: #21262d;
            border: none;
            color: #58a6ff;
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 6px;
        }
        td .copy-btn:hover { background: #30363d; }
        .empty-msg {
            padding: 30px;
            text-align: center;
            color: #8b949e;
            font-style: italic;
        }
        #log {
            background: #0d1117;
            border-radius: 10px;
            padding: 14px;
            max-height: 180px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid #30363d;
            white-space: pre-wrap;
            word-break: break-all;
        }
        #log .ok { color: #3fb950; }
        #log .err { color: #f85149; }
        #log .info { color: #58a6ff; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        @media (max-width: 600px) {
            .container { padding: 16px; }
            .controls button { min-width: 100%; }
            td { font-size: 12px; padding: 8px 6px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        📧 Gmail Creator
        <small>tạo acc + đăng nhập thủ công</small>
    </h1>

    <div class="info-box">
        <span>🔑 Mật khẩu chung:</span>
        <span class="pwd">Ducanh05092008</span>
        <span class="badge">✅ Dùng cho tất cả acc</span>
    </div>

    <div class="controls">
        <button class="btn-create" id="createBtn">➕ Tạo 1 acc</button>
        <button class="btn-create" id="createBatchBtn">📦 Tạo 5 acc</button>
        <button class="btn-copy" id="copyAllBtn">📋 Sao chép danh sách</button>
        <button class="btn-export" id="exportBtn">💾 Xuất file .txt</button>
        <button class="btn-clear" id="clearBtn">🗑️ Xóa tất cả</button>
    </div>

    <div class="stats">
        <span>📊 Tổng: <strong id="countDisplay">0</strong></span>
        <span>🟢 Hợp lệ: <strong id="validDisplay">0</strong></span>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="width:40px;">#</th>
                    <th>Email</th>
                    <th style="min-width:140px;">Mật khẩu</th>
                    <th style="width:80px;">Thao tác</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4" class="empty-msg">Chưa có tài khoản nào. Nhấn "Tạo" để bắt đầu.</td></tr>
            </tbody>
        </table>
    </div>

    <div id="log">[✓] Sẵn sàng. Mật khẩu chung: Ducanh05092008</div>
</div>

<script>
    // ============================================================
    // DỮ LIỆU
    // ============================================================
    let accounts = [];
    const COMMON_PWD = "Ducanh05092008";

    // ============================================================
    // HÀM TẠO THÔNG TIN
    // ============================================================
    function generateEmail() {
        const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        let username = '';
        for (let i = 0; i < 8; i++) {
            username += chars[Math.floor(Math.random() * chars.length)];
        }
        // Thêm số để tránh trùng
        username += Math.floor(Math.random() * 1000);
        return username + '@gmail.com';
    }

    function generateName() {
        const firstNames = ['Anh', 'Bao', 'Chau', 'Duc', 'Hai', 'Khoa', 'Lam', 'Minh', 'Nam', 'Phuc', 'Quang', 'Son', 'Tuan', 'Vinh', 'Xuan', 'Yen'];
        const lastNames = ['Nguyen', 'Tran', 'Le', 'Pham', 'Huynh', 'Phan', 'Vu', 'Dang', 'Bui', 'Do', 'Ho', 'Ngo', 'Duong', 'Ly'];
        return {
            first: firstNames[Math.floor(Math.random() * firstNames.length)],
            last: lastNames[Math.floor(Math.random() * lastNames.length)]
        };
    }

    function createAccount() {
        const email = generateEmail();
        const name = generateName();
        return {
            email: email,
            password: COMMON_PWD,
            fullName: name.first + ' ' + name.last,
            created: new Date().toLocaleString()
        };
    }

    // ============================================================
    // RENDER BẢNG
    // ============================================================
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const count = document.getElementById('countDisplay');
        const valid = document.getElementById('validDisplay');

        count.textContent = accounts.length;
        valid.textContent = accounts.length; // tất cả đều hợp lệ

        if (accounts.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="empty-msg">Chưa có tài khoản nào. Nhấn "Tạo" để bắt đầu.</td></tr>`;
            return;
        }

        let html = '';
        accounts.forEach((acc, index) => {
            html += `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${acc.email}</strong></td>
                    <td>
                        <span style="color:#f0883e;font-weight:bold;">${acc.password}</span>
                        <button class="copy-btn" data-email="${acc.email}" data-pwd="${acc.password}">📋</button>
                    </td>
                    <td>
                        <button class="copy-btn" style="background:#238636;color:#fff;border:none;padding:2px 12px;border-radius:4px;cursor:pointer;" 
                                onclick="window.open('https://mail.google.com','_blank')">
                            🔑 Đăng nhập
                        </button>
                    </td>
                </tr>
            `;
        });
        tbody.innerHTML = html;

        // Gắn sự kiện copy cho từng nút
        document.querySelectorAll('.copy-btn[data-email]').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const email = this.getAttribute('data-email');
                const pwd = this.getAttribute('data-pwd');
                const text = `Email: ${email}\nMật khẩu: ${pwd}`;
                navigator.clipboard.writeText(text).then(() => {
                    addLog(`✅ Đã copy: ${email}`, 'ok');
                }).catch(() => {
                    // fallback
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                    addLog(`✅ Đã copy: ${email}`, 'ok');
                });
            });
        });
    }

    // ============================================================
    // LOG
    // ============================================================
    function addLog(msg, type = 'info') {
        const log = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const cls = type === 'ok' ? 'ok' : (type === 'err' ? 'err' : 'info');
        log.innerHTML += `\n[${time}] <span class="${cls}">${msg}</span>`;
        log.scrollTop = log.scrollHeight;
    }

    // ============================================================
    // SỰ KIỆN NÚT
    // ============================================================

    // Tạo 1
    document.getElementById('createBtn').addEventListener('click', function() {
        const acc = createAccount();
        accounts.push(acc);
        renderTable();
        addLog(`✅ Tạo thành công: ${acc.email} | PWD: ${acc.password}`, 'ok');
        addLog(`👉 Đăng nhập tại: https://mail.google.com  (dùng mật khẩu chung)`, 'info');
    });

    // Tạo 5
    document.getElementById('createBatchBtn').addEventListener('click', function() {
        const count = 5;
        for (let i = 0; i < count; i++) {
            const acc = createAccount();
            accounts.push(acc);
        }
        renderTable();
        addLog(`✅ Đã tạo ${count} tài khoản. Tổng: ${accounts.length}`, 'ok');
        addLog(`👉 Mật khẩu chung: ${COMMON_PWD}`, 'info');
    });

    // Xóa tất cả
    document.getElementById('clearBtn').addEventListener('click', function() {
        if (accounts.length === 0) return;
        if (confirm('Xóa tất cả tài khoản đã tạo?')) {
            accounts = [];
            renderTable();
            addLog('🗑️ Đã xóa toàn bộ', 'err');
        }
    });

    // Sao chép danh sách
    document.getElementById('copyAllBtn').addEventListener('click', function() {
        if (accounts.length === 0) {
            addLog('⚠️ Không có acc để copy', 'err');
            return;
        }
        let text = '=== DANH SÁCH GMAIL ===\n';
        text += `Mật khẩu chung: ${COMMON_PWD}\n\n`;
        accounts.forEach((acc, i) => {
            text += `${i+1}. ${acc.email} | ${acc.password}\n`;
        });
        navigator.clipboard.writeText(text).then(() => {
            addLog(`📋 Đã copy ${accounts.length} acc vào clipboard`, 'ok');
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
            addLog(`📋 Đã copy ${accounts.length} acc (fallback)`, 'ok');
        });
    });

    // Xuất file .txt
    document.getElementById('exportBtn').addEventListener('click', function() {
        if (accounts.length === 0) {
            addLog('⚠️ Không có acc để xuất', 'err');
            return;
        }
        let content = '=== GMAIL ACCOUNTS ===\n';
        content += `Mật khẩu chung: ${COMMON_PWD}\n`;
        content += `Tạo ngày: ${new Date().toLocaleString()}\n\n`;
        accounts.forEach((acc, i) => {
            content += `${i+1}. ${acc.email} | ${acc.password} | ${acc.fullName}\n`;
        });

        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `gmail_accounts_${Date.now()}.txt`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        addLog(`💾 Đã xuất file với ${accounts.length} acc`, 'ok');
    });

    // ============================================================
    // KHỞI TẠO
    // ============================================================
    renderTable();
    addLog('✅ Tool sẵn sàng. Mật khẩu chung: Ducanh05092008', 'ok');
    addLog('👉 Sau khi tạo, mở Gmail và đăng nhập thủ công', 'info');

    // Tự động thêm 1 acc demo để test
    setTimeout(() => {
        const demo = createAccount();
        accounts.push(demo);
        renderTable();
        addLog(`📌 Demo: ${demo.email} | ${demo.password}`, 'info');
    }, 500);
</script>
</body>
</html>
